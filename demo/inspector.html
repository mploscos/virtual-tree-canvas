<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>virtual-tree-canvas inspector demo</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .inspector-demo {
        position: fixed;
        inset: 44px 0 0 0;
        display: grid;
        grid-template-columns: minmax(420px, 1fr) minmax(320px, 42vw);
        background: #0f1419;
      }
      .inspector-canvas-host {
        position: relative;
        overflow: hidden;
        min-width: 0;
      }
      #filter {
        position: absolute;
        top: 4px;
        left: 8px;
        right: 8px;
        z-index: 2;
        height: 22px;
        min-width: 0;
        box-sizing: border-box;
        border: 1px solid #263244;
        border-radius: 4px;
        background: #1f2937;
        color: #e5e7eb;
        padding: 0 8px;
        outline: none;
        font: 12px system-ui, sans-serif;
      }
      #filter::placeholder {
        color: #94a3b8;
      }
      #filter:focus {
        border-color: #38bdf8;
      }
      .inspector-demo #tree {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        top: 30px;
        width: 100%;
        height: calc(100% - 30px);
      }
      .json-preview {
        margin: 0;
        border-left: 1px solid #2a343d;
        background: #0b1020;
        color: #dbeafe;
        padding: 12px;
        overflow: auto;
        font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      #tooltip {
        position: absolute;
        z-index: 3;
        display: none;
        max-width: min(360px, calc(100% - 16px));
        padding: 6px 8px;
        border: 1px solid #334155;
        border-radius: 4px;
        box-sizing: border-box;
        pointer-events: none;
        background: #020617;
        color: #e5e7eb;
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
        font: 12px/1.35 system-ui, sans-serif;
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <header class="toolbar">
      <strong>virtual-tree-canvas inspector</strong>
      <select id="mode">
        <option value="pane">Pane</option>
        <option value="table">Table</option>
      </select>
      <button id="focus-range" type="button">Focus range</button>
      <span id="message"></span>
    </header>
    <main class="inspector-demo">
      <div class="inspector-canvas-host">
        <input id="filter" type="search" autocomplete="off" spellcheck="false" placeholder="Filter inspector" />
        <canvas id="tree"></canvas>
        <div id="tooltip" role="tooltip"></div>
      </div>
      <pre id="json" class="json-preview"></pre>
    </main>
    <script type="module" src="./inspector-main.js"></script>
  </body>
</html>
